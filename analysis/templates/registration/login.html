<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Presta Labs</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Encode+Sans:100,200,300,400,500,600,700,800,900" rel="stylesheet">
    
    <style>
        :root {
            --blue-primary: #0066CC;
            --blue-dark: #242C4F;
            --yellow-corporate: #FFD700;
        }
        body {
            font-family: 'Encode Sans', Arial, sans-serif;
            background: linear-gradient(135deg, var(--blue-primary) 0%, var(--blue-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 102, 204, 0.15);
            overflow: hidden;
        }
        .login-header {
            background: var(--blue-dark);
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .login-header .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--yellow-corporate);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.8rem;
            color: var(--blue-dark);
        }
        .btn-login {
            background: var(--blue-primary);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-login:hover {
            background: var(--blue-dark);
        }
        .test-account {
            background: #f8f9fa;
            border-left: 4px solid var(--yellow-corporate);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="login-container">
                    <div class="login-header">
                        <div class="logo-icon">
                            <i class="fas fa-microscope"></i>
                        </div>
                        <h3 class="mb-1">Presta Labs</h3>
                        <p class="mb-0 opacity-75">Análisis de Accesibilidad Web</p>
                    </div>

                    <div class="login-body p-4">
                        {% if form.errors %}
                            <div class="alert alert-danger" role="alert">
                                <i class="fas fa-exclamation-triangle"></i>
                                <strong>Error:</strong> Usuario o contraseña incorrectos.
                            </div>
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="id_username" class="form-label fw-semibold">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-user"></i>
                                    </span>
                                    <input type="text" class="form-control" id="id_username" name="username" 
                                           placeholder="Ingresa tu usuario" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="id_password" class="form-label fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-lock"></i>
                                    </span>
                                    <input type="password" class="form-control" id="id_password" name="password" 
                                           placeholder="Ingresa tu contraseña" required>
                                </div>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-login">
                                    <i class="fas fa-sign-in-alt me-2"></i>
                                    Iniciar Sesión
                                </button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-4">
                            <small class="text-muted">
                                <i class="fas fa-info-circle me-1"></i>
                                ¿No tienes cuenta? Contacta al administrador del sistema.
                            </small>
                        </div>

                        <div class="test-account">
                            <h6 class="mb-2">
                                <i class="fas fa-flask text-warning me-2"></i>
                                Cuenta de Prueba
                            </h6>
                            <div class="row">
                                <div class="col-6">
                                    <small><strong>Usuario:</strong> admin</small>
                                </div>
                                <div class="col-6">
                                    <small><strong>Contraseña:</strong> admin123</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
